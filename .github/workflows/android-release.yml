name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: 'Build type (bundleRelease or assembleRelease)'
        required: true
        default: 'assembleRelease'
        type: choice
        options:
          - assembleRelease
          - bundleRelease
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Restore Keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Configure signing via Gradle properties
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties <<EOF
          MY_KEYSTORE=${{ github.workspace }}/release.keystore
          MY_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          MY_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          MY_STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}
          EOF

      - name: Build Release (Unsigned fallback)
        if: ${{ env.HAS_KEYSTORE != 'true' }}
        run: |
          echo "No keystore found - building unsigned debug APK instead"
          ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Build Release (Signed)
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        run: ./gradlew --no-daemon --stacktrace ${{ github.event.inputs.build-type || 'assembleRelease' }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        if: success()
        run: |
          echo "### 🚀 Release Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type:** ${{ github.event.inputs.build-type || 'assembleRelease' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Number:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Download:** Check the artifacts section above" >> $GITHUB_STEP_SUMMARY
